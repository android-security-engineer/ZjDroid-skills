# .github/workflows/ci.yml
# 质量门禁：PR 和 push 时跑 SDK 单元测试 + 构建并校验 APK 产物
# 不发布 Release（发布由 build-apk.yml 负责），仅做合并门禁
name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'res/**'
      - 'assets/**'
      - 'AndroidManifest.xml'
      - 'app/**'
      - 'sdk/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/ci.yml'

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-sdk:
    name: SDK unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install SDK package + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e sdk[dev]

      - name: Run pytest
        run: |
          cd sdk
          pytest -v

  build-and-verify-apk:
    name: Build & verify APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-18'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.5.1

      - name: Build release APK
        run: gradle :app:assembleRelease -x lint

      - name: Verify APK artifact
        run: bash scripts/check-apk.sh app/build/outputs/apk/release/zjdroid-release.apk
