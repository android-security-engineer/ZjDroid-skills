# .github/workflows/build-apk.yml
# 构建 ZjDroid APK 并发布到 GitHub Release，供 AI Agent 直接下载
name: Build and Release APK

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'res/**'
      - 'assets/**'
      - 'AndroidManifest.xml'
      - 'build.gradle'
      - 'settings.gradle'
      - 'app/build.gradle'
      - 'libs/**'
      - 'lib/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false

permissions:
  contents: write   # 发布 Release 需要写权限
  actions: read     # setup-gradle 缓存需要

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-18'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.5.1

      - name: Build release APK
        run: gradle :app:assembleRelease -x lint

      - name: Rename artifact
        run: mv app/build/outputs/apk/release/zjdroid-release.apk zjdroid.apk

      - name: Compute version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v1.0.$(git rev-list --count HEAD)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ZjDroid ${{ steps.ver.outputs.tag }}
          files: zjdroid.apk
          generate_release_notes: true
          prerelease: false
